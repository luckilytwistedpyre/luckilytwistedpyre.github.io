<p>Clove water is a simple infusion made by soaking dried cloves in water, typically overnight. This allows the beneficial compounds within cloves to release into the water, creating a mild, aromatic drink.</p>

<p>Cloves are known for their rich concentration of antioxidants and natural oils. These properties have made them a staple in traditional health practices across different cultures. Today, clove water is gaining popularity as a natural and accessible wellness drink.</p>

<p>Preparing clove water is quick and requires only a few simple steps. You do not need any specialized equipment, making it accessible for anyone.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Step-by-Step Preparation</h3>

<p>This gentle soaking process helps extract the flavor and beneficial compounds without making the drink too strong or bitter.</p>

        // 2. Application Logic
        const app = document.getElementById('app');
        const blogUsername = "The Curated Life OR Edit";
        const avatarUrl = "./assets/blog-avatar.jpg"; // A placeholder avatar

        // Function to render the home page (list of posts)
        function renderHome() {
            let html = '';
            posts.forEach(post => {
                html += `
                    <div class="post-card" onclick="navigate('post', '${post.id}')">
                        <div class="post-header">
                            <img class="avatar" src="${avatarUrl}" alt="Avatar">
                            <span class="username">${blogUsername}</span>
                        </div>
                        <img class="post-image" src="${post.image}" alt="${post.title}" onerror="this.onerror=null; this.src='https://via.placeholder.com/540x400?text=Image+Not+Found'">
                        <div class="post-content">
                            <h2>${post.title}</h2>
                            <p>${post.excerpt}</p>
                        </div>
                        <div class="post-footer">
                            <span>${post.date}</span>
                            <span style="letter-spacing: 10px; font-size: 1.1rem;">↻ ♥</span>
                        </div>
                    </div>
                `;
            });
            app.innerHTML = html;
        }

        // Function to render a static page (like Privacy Policy)
        function renderPage(pageId) {
            const page = pages[pageId];

            if (!page) {
                app.innerHTML = `<p style="color: var(--text-color);">Page not found.</p><a class="back-button" onclick="navigate('home')">&larr; Back to Dashboard</a>`;
                return;
            }

            app.innerHTML = `
                <a class="back-button" onclick="navigate('home')">&larr; Back to Dashboard</a>
                <div class="single-post">
                    <div class="post-content" style="padding-top: 30px; padding-bottom: 30px;">
                        <h1>${page.title}</h1>
                        ${page.content}
                    </div>
                </div>
            `;
            window.scrollTo(0, 0); // Scroll to top
        }

        // Function to render a single post
        function renderPost(postId) {
            const post = posts.find(p => p.id === postId);

            if (!post) {
                app.innerHTML = `<p style="color: var(--text-color);">Post not found.</p><a class="back-button" onclick="navigate('home')">&larr; Back to Dashboard</a>`;
                return;
            }

            app.innerHTML = `
                <a class="back-button" onclick="navigate('home')">&larr; Back to Dashboard</a>
                <div class="single-post">
                    <div class="post-header">
                        <img class="avatar" src="${avatarUrl}" alt="Avatar">
                        <span class="username">${blogUsername}</span>
                    </div>
                    <img class="post-image" src="${post.image}" alt="${post.title}" onerror="this.onerror=null; this.src='https://via.placeholder.com/540x400?text=Image+Not+Found'">
                    <div class="post-content">
                        <h1>${post.title}</h1>
                        ${post.content}
                    </div>
                    <div class="post-footer">
                        <span>${post.date}</span>
                        <span style="letter-spacing: 10px; font-size: 1.1rem;">↻ ♥</span>
                    </div>
                </div>
            `;
            window.scrollTo(0, 0); // Scroll to top
        }

        // Simple router/navigator
        function navigate(view, id = null) {
            if (view === 'home') {
                window.location.hash = '';
                renderHome();
            } else if (view === 'post') {
                window.location.hash = id;
                renderPost(id);
            } else if (view === 'page') {
                window.location.hash = id;
                renderPage(id);
            }
        }

        // Listen for browser back/forward buttons
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                // Check if the hash matches a static page, otherwise assume it's a post
                if (pages[hash]) {
                    renderPage(hash);
                } else {
                    renderPost(hash);
                }
            } else {
                renderHome();
            }
        });

        // Initial Load
        const initialHash = window.location.hash.replace('#', '');
        if (initialHash) {
            if (pages[initialHash]) {
                renderPage(initialHash);
            } else {
                renderPost(initialHash);
            }
        } else {
            renderHome();
        }
    </script>
